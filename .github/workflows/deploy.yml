permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gha-role-umbra-server
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      id: ecr
      uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

    - name: Set up QEMU
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Build and push Docker image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: true
        platforms: linux/arm64
        tags: ${{ steps.ecr.outputs.registry }}/umbra-server:${{ github.sha }}

    - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
      with:
        tofu_version: 1.11.5

    - name: Deploy infrastructure
      run: |
        cd .infrastructure
        tofu init \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -backend-config="region=${{ secrets.AWS_REGION }}"
        tofu apply -auto-approve \
          -var="image_tag=${{ github.sha }}" \
          -var='allowed_ips=${{ secrets.ALLOWED_IPS }}' \
          -var="vpc_id=${{ secrets.VPC_ID }}" \
          -var="subnet_id=${{ secrets.SUBNET_ID }}" \
          -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
          -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -var="aws_region=${{ secrets.AWS_REGION }}"

    - name: Deploy container via SSM
      run: |
        cd .infrastructure
        INSTANCE_ID=$(tofu output -raw instance_id)
        ECR_URL=$(tofu output -raw ecr_repository_url)
        ECR_REGISTRY="${ECR_URL%%/*}"
        IMAGE="${ECR_URL}:${{ github.sha }}"

        cat > /tmp/ssm-command.json <<EOF
        {
          "InstanceIds": ["${INSTANCE_ID}"],
          "DocumentName": "AWS-RunShellScript",
          "TimeoutSeconds": 300,
          "Parameters": {
            "commands": [
              "set -e",
              "while ! docker info >/dev/null 2>&1; do sleep 5; done",
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
              "docker stop umbra-server 2>/dev/null || true",
              "docker rm umbra-server 2>/dev/null || true",
              "docker pull ${IMAGE}",
              "docker run -d --name umbra-server -p 52224:52224/udp --restart unless-stopped ${IMAGE}",
              "docker image prune -af"
            ]
          }
        }
        EOF

        COMMAND_ID=$(aws ssm send-command \
          --cli-input-json file:///tmp/ssm-command.json \
          --query 'Command.CommandId' \
          --output text)

        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID"

        echo "Deployed to $(tofu output -raw public_ip):52224"
